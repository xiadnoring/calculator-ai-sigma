version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: calculator_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - calculator_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: calculator_backend
    env_file:
      - .env
    environment:
      CALCULATORAI_CONFIG: /app/config.json
      CALCULATORAI_FRONTEND: /app/frontend/build
    volumes:
      - ./config.json:/app/config-template.json:ro
    ports:
      - "8888:8888"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - calculator_network

networks:
  calculator_network:
    driver: bridge

volumes:
  postgres_data:
